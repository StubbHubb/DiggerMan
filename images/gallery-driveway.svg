<?xml version="1.0" encoding="UTF-8"?>
<!-- Gallery 3 — Gravel driveway -->
<svg preserveaspectratio="xMidYMid slice" style="width:100%;height:100%;display:block;" viewbox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
<!-- Background sky -->
<rect fill="#7a9fb8" height="280" width="400"></rect>
<!-- House background -->
<rect fill="#c9a97a" height="130" width="160" x="230" y="80"></rect>
<polygon fill="#8B4513" points="225,80 310,30 395,80"></polygon>
<rect fill="#7a5c3a" height="55" width="40" x="270" y="125"></rect>
<rect fill="#aed6f1" height="28" opacity="0.65" width="35" x="240" y="95"></rect>
<rect fill="#aed6f1" height="28" opacity="0.65" width="35" x="325" y="95"></rect>
<!-- Garden lawn sides -->
<rect fill="#5a3e28" height="85" width="400" x="0" y="195"></rect>
<rect fill="#5a8a3a" height="22" rx="3" width="80" x="0" y="188"></rect>
<rect fill="#5a8a3a" height="22" rx="3" width="80" x="320" y="188"></rect>
<!-- Driveway base (compacted) -->
<rect fill="#7a6a50" height="95" width="240" x="80" y="175"></rect>
<!-- Gravel texture - dots -->
<rect fill="url(#gravel)" height="95" width="240" x="80" y="175"></rect>
<defs>
<pattern height="12" id="gravel" patternunits="userSpaceOnUse" width="12" x="0" y="0">
<circle cx="3" cy="3" fill="#a09070" opacity="0.8" r="2"></circle>
<circle cx="9" cy="7" fill="#908060" opacity="0.7" r="1.5"></circle>
<circle cx="6" cy="10" fill="#b0a080" opacity="0.6" r="1.8"></circle>
</pattern>
</defs>
<!-- Fresh gravel pile on right -->
<ellipse cx="360" cy="190" fill="#b8a878" rx="40" ry="18"></ellipse>
<ellipse cx="355" cy="182" fill="#c8b888" rx="28" ry="12"></ellipse>
<!-- Wheelbarrow -->
<ellipse cx="175" cy="215" fill="#888" opacity="0.9" rx="22" ry="8"></ellipse>
<path d="M155 207 L160 235 L195 235 L198 207 Z" fill="#777"></path>
<line stroke="#555" stroke-linecap="round" stroke-width="4" x1="152" x2="138" y1="210" y2="240"></line>
<line stroke="#555" stroke-linecap="round" stroke-width="4" x1="200" x2="214" y1="210" y2="240"></line>
<circle cx="176" cy="238" fill="#444" r="7" stroke="#333" stroke-width="2"></circle>
<!-- Gravel in barrow -->
<ellipse cx="177" cy="210" fill="#c0ae80" rx="18" ry="6"></ellipse>
<!-- Worker with rake -->
<rect fill="#4a7a4a" height="32" rx="4" width="20" x="215" y="188"></rect>
<circle cx="225" cy="180" fill="#d4956a" r="11"></circle>
<ellipse cx="225" cy="173" fill="#e8900c" rx="12" ry="5"></ellipse>
<!-- Rake arm -->
<line stroke="#d4956a" stroke-linecap="round" stroke-width="4" x1="215" x2="195" y1="198" y2="218"></line>
<!-- Rake tool -->
<line stroke="#8B6914" stroke-width="3" x1="185" x2="200" y1="210" y2="228"></line>
<line stroke="#8B6914" stroke-width="2.5" x1="179" x2="206" y1="223" y2="232"></line>
<line stroke="#8B6914" stroke-width="2" x1="181" x2="183" y1="226" y2="233"></line>
<line stroke="#8B6914" stroke-width="2" x1="188" x2="190" y1="228" y2="235"></line>
<line stroke="#8B6914" stroke-width="2" x1="195" x2="197" y1="229" y2="236"></line>
<!-- Legs -->
<rect fill="#2a4a2a" height="16" rx="2" width="7" x="217" y="218"></rect>
<rect fill="#2a4a2a" height="16" rx="2" width="7" x="227" y="218"></rect>
<!-- Boots -->
<rect fill="#1a1209" height="5" rx="2" width="10" x="215" y="232"></rect>
<rect fill="#1a1209" height="5" rx="2" width="10" x="225" y="232"></rect>
<!-- Edge restraint boards -->
<rect fill="#8B6914" height="95" width="6" x="80" y="175"></rect>
<rect fill="#8B6914" height="95" width="6" x="314" y="175"></rect>
<!-- Amber overlay -->
<rect fill="rgba(232,144,12,0.05)" height="280" width="400"></rect>
</svg>