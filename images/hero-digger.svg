<?xml version="1.0" encoding="UTF-8"?>
<!-- Hero — Mini digger on residential plot -->
<svg class="hero-img" preserveaspectratio="xMidYMid slice" viewbox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
<!-- Sky -->
<rect fill="#87a0b2" height="600" width="800"></rect>
<rect fill="#5a3e28" height="300" width="800" y="300"></rect>
<!-- Clouds -->
<ellipse cx="180" cy="100" fill="rgba(255,255,255,0.35)" rx="70" ry="30"></ellipse>
<ellipse cx="230" cy="90" fill="rgba(255,255,255,0.35)" rx="50" ry="25"></ellipse>
<ellipse cx="580" cy="130" fill="rgba(255,255,255,0.25)" rx="60" ry="25"></ellipse>
<!-- Ground texture -->
<rect fill="#4a3220" height="230" width="800" y="370"></rect>
<rect fill="#6b4a2a" height="20" rx="4" width="800" y="360"></rect>
<!-- Excavated pit -->
<ellipse cx="420" cy="395" fill="#2e1d0e" rx="140" ry="30"></ellipse>
<rect fill="#2e1d0e" height="80" rx="4" width="280" x="280" y="380"></rect>
<!-- Soil mound -->
<ellipse cx="620" cy="365" fill="#7a5230" rx="80" ry="25"></ellipse>
<ellipse cx="640" cy="355" fill="#8a6040" rx="55" ry="18"></ellipse>
<!-- DIGGER BODY -->
<!-- Tracks -->
<rect fill="#1a1209" height="35" rx="12" width="180" x="180" y="390"></rect>
<circle cx="200" cy="408" fill="#333" r="16" stroke="#555" stroke-width="2"></circle>
<circle cx="340" cy="408" fill="#333" r="16" stroke="#555" stroke-width="2"></circle>
<rect fill="#444" height="8" rx="3" width="140" x="200" y="392"></rect>
<!-- Cab base -->
<rect fill="#e8900c" height="55" rx="6" width="150" x="200" y="340"></rect>
<!-- Cab top / window -->
<rect fill="#c07008" height="30" rx="4" width="110" x="215" y="315"></rect>
<rect fill="#aed6f1" height="22" opacity="0.6" rx="3" width="95" x="222" y="318"></rect>
<!-- Hydraulic arm base -->
<rect fill="#b06000" height="50" rx="4" transform="rotate(-10,345,355)" width="20" x="335" y="330"></rect>
<!-- Boom arm -->
<line stroke="#8a5000" stroke-linecap="round" stroke-width="14" x1="350" x2="480" y1="340" y2="270"></line>
<!-- Dipper arm -->
<line stroke="#7a4800" stroke-linecap="round" stroke-width="10" x1="480" x2="510" y1="270" y2="370"></line>
<!-- Bucket -->
<path d="M500 370 Q510 410 530 415 Q545 415 548 395 L530 370 Z" fill="#555" stroke="#333" stroke-width="2"></path>
<!-- Bucket teeth -->
<line stroke="#333" stroke-width="3" x1="510" x2="508" y1="413" y2="428"></line>
<line stroke="#333" stroke-width="3" x1="522" x2="520" y1="415" y2="430"></line>
<line stroke="#333" stroke-width="3" x1="534" x2="533" y1="413" y2="428"></line>
<!-- Hydraulic cylinders -->
<line stroke="#999" stroke-linecap="round" stroke-width="5" x1="360" x2="440" y1="335" y2="305"></line>
<line stroke="#999" stroke-linecap="round" stroke-width="4" x1="475" x2="498" y1="272" y2="340"></line>
<!-- House front detail -->
<rect fill="#c07008" height="15" rx="2" width="25" x="330" y="355"></rect>
<!-- Exhaust pipe -->
<rect fill="#333" height="20" rx="2" width="6" x="205" y="298"></rect>
<!-- Exhaust smoke -->
<circle cx="208" cy="285" fill="rgba(200,200,200,0.4)" r="8"></circle>
<circle cx="212" cy="272" fill="rgba(200,200,200,0.3)" r="6"></circle>
<!-- Operator silhouette -->
<circle cx="265" cy="324" fill="#2c1a08" r="10"></circle>
<rect fill="#2c1a08" height="14" rx="2" width="14" x="258" y="332"></rect>
<!-- Fence panels in background -->
<rect fill="#8B6914" height="90" width="8" x="600" y="290"></rect>
<rect fill="#8B6914" height="95" width="8" x="650" y="285"></rect>
<rect fill="#8B6914" height="92" width="8" x="700" y="288"></rect>
<rect fill="#a07820" height="6" rx="2" width="110" x="600" y="305"></rect>
<rect fill="#a07820" height="6" rx="2" width="110" x="600" y="340"></rect>
<rect fill="#a07820" height="6" rx="2" width="110" x="600" y="365"></rect>
<!-- Amber tint overlay -->
<rect fill="rgba(232,144,12,0.08)" height="600" width="800"></rect>
</svg>